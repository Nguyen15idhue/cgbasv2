<div class="page-header">
    <h1><i class="fas fa-broadcast-tower"></i> Danh sách Trạm CGBAS</h1>
    <div class="header-actions">
        <input type="text" class="form-control" id="searchInput" placeholder="Tìm kiếm trạm..." onkeyup="filterStations()" autocomplete="off">
        <select class="form-select" id="statusFilter">
            <option value="">Tất cả trạng thái</option>
            <option value="1">Online</option>
            <option value="0">Offline</option>
        </select>
        <select class="form-select" id="sourceFilter" onchange="loadStationsData()">
            <option value="">Tất cả nguồn</option>
            <option value="cgbas">CGBAS</option>
            <option value="ntrip">NTRIP</option>
        </select>
    </div>
</div>

<!-- NTRIP Config Modal -->
<div class="modal fade" id="ntripConfigModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Cấu hình NTRIP</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="ntripStationId">
                <div class="mb-3">
                    <label class="form-label">NTRIP URL <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="ntripUrl" placeholder="http://ip:port" autocomplete="off">
                </div>
                <div class="mb-3">
                    <label class="form-label">Mountpoint <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="ntripMountpoint" placeholder="VD: i50_HG" autocomplete="off">
                </div>
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" class="form-control" id="ntripUser" placeholder="Username" autocomplete="off">
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-control" id="ntripPass" placeholder="Password" autocomplete="new-password">
                </div>
                <div class="mb-3">
                    <label class="form-label">Tần suất gửi GGA</label>
                    <select class="form-select" id="ntripGgaFrequency">
                        <option value="5hz">5 Hz (200ms)</option>
                        <option value="1hz" selected>1 Hz (1s)</option>
                        <option value="2s">2 giây</option>
                        <option value="5s">5 giây</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                <button type="button" class="btn btn-warning" onclick="switchSource('ntrip')">Chuyển sang NTRIP</button>
            </div>
        </div>
    </div>
</div>

<div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
        <span><i class="fas fa-list"></i> Danh sách trạm (<span id="totalStations">0</span>)</span>
    </div>
    <div class="card-body p-0">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead>
                    <tr>
                        <th>Tên trạm</th>
                        <th>Tên định danh</th>
                        <th>Nguồn</th>
                        <th>Trạng thái</th>
                        <th>Vệ tinh</th>
                        <th>Độ trễ</th>
                        <th>Device ID</th>
                        <th>Thao tác</th>
                    </tr>
                </thead>
                <tbody id="stationsTableBody">
                    <!-- Data loaded by JS -->
                </tbody>
            </table>
        </div>
    </div>
    <div class="card-footer">
        <div id="stationsPagination"></div>
    </div>
</div>
