services:
  # MySQL Database
  mysql:
    image: mysql:8.0-debian
    container_name: cgbas-mysql
    restart: unless-stopped
    environment:
      TZ: Asia/Ho_Chi_Minh
      MYSQL_ROOT_PASSWORD: ${DB_PASS:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-cgbas_db}
      MYSQL_USER: ${DB_USER:-cgbas}
      MYSQL_PASSWORD: ${DB_PASS:-cgbaspassword}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./src/migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "3307:3306"  # Changed to 3307 to avoid conflict with existing MySQL
    networks:
      - cgbas-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: --default-authentication-plugin=mysql_native_password

  # CGBAS App - Development
  app-dev:
    build:
      context: .
      target: development
      dockerfile: Dockerfile
    container_name: cgbas-app-dev
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      TZ: Asia/Ho_Chi_Minh
      NODE_ENV: development
      DB_HOST: mysql
      DB_USER: ${DB_USER:-cgbas}
      DB_PASS: ${DB_PASS:-cgbaspassword}
      DB_NAME: ${DB_NAME:-cgbas_db}
      SESSION_SECRET: ${SESSION_SECRET:-dev-secret-key}
      AK: ${AK}
      SK: ${SK}
      API_BASE_URL: ${API_BASE_URL}
      NTRIP_SERVICE_URL: http://ntrip-dev:3101
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - cgbas-network
    profiles:
      - dev

  # CGBAS App - Production
  app-prod:
    build:
      context: .
      target: production
      dockerfile: Dockerfile
    container_name: cgbas-app-prod
    restart: always
    ports:
      - "3001:3001"
    environment:
      TZ: Asia/Ho_Chi_Minh
      NODE_ENV: production
      DB_HOST: mysql
      DB_USER: ${DB_USER:-cgbas}
      DB_PASS: ${DB_PASS:-cgbaspassword}
      DB_NAME: ${DB_NAME:-cgbas_db}
      SESSION_SECRET: ${SESSION_SECRET}
      AK: ${AK}
      SK: ${SK}
      API_BASE_URL: ${API_BASE_URL}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
      NTRIP_SERVICE_URL: http://ntrip-prod:3101
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - cgbas-network
    profiles:
      - prod
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

  # NTRIP Client - Development
  ntrip-dev:
    build:
      context: ./ntrip-client
      dockerfile: Dockerfile
    container_name: cgbas-ntrip-dev
    restart: unless-stopped
    ports:
      - "3101:3101"
    environment:
      TZ: Asia/Ho_Chi_Minh
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-cgbas_db}
      DB_USER: root
      DB_PASS: ${DB_PASS:-cgbaspassword}
      LISTEN_ADDR: ":3101"
      NTRIP_POLL_INTERVAL: 5
      NTRIP_RECONNECT_DELAY: 30
      NTRIP_DATA_TIMEOUT: 30
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - cgbas-network
    profiles:
      - dev

  # NTRIP Client - Production
  ntrip-prod:
    build:
      context: ./ntrip-client
      dockerfile: Dockerfile
    container_name: cgbas-ntrip-prod
    restart: always
    ports:
      - "3101:3101"
    environment:
      TZ: Asia/Ho_Chi_Minh
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-cgbas_db}
      DB_USER: root
      DB_PASS: ${DB_PASS:-cgbaspassword}
      LISTEN_ADDR: ":3101"
      NTRIP_POLL_INTERVAL: ${NTRIP_POLL_INTERVAL:-5}
      NTRIP_RECONNECT_DELAY: ${NTRIP_RECONNECT_DELAY:-30}
      NTRIP_DATA_TIMEOUT: ${NTRIP_DATA_TIMEOUT:-30}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - cgbas-network
    profiles:
      - prod
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M

networks:
  cgbas-network:
    driver: bridge

volumes:
  mysql_data:
    driver: local
